<!DOCTYPE html>
<html>
<head>
    <title>Style Test</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; 
            background: #f2f2f7;
            color: #1d1d1f;
            padding: 2rem;
        }
        .test-card { 
            background: #ffffff;
            border-radius: 12px;
            padding: 2rem;
            margin: 1rem 0;
            border: 0.5px solid rgba(0, 0, 0, 0.04);
        }
        .btn { 
            background: #007aff; 
            color: white; 
            border: none; 
            padding: 0.75rem 1.5rem; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: 600;
        }
        .hero { 
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%); 
            color: white; 
            text-align: center; 
            padding: 4rem 2rem; 
            border-radius: 18px; 
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>🔨 Style Test Working!</h1>
        <p>If you see blue gradient background, CSS is working</p>
    </div>
    
    <div class="test-card">
        <h2>Apple Store Design Test</h2>
        <p>This should have white background with rounded corners</p>
        <button class="btn">Blue Button Test</button>
    </div>
    
    <div class="test-card">
        <h3>Colors Test:</h3>
        <p style="color: #007aff;">Blue text (#007aff)</p>
        <p style="color: #86868b;">Gray text (#86868b)</p>
        <p style="color: #34c759;">Green text (#34c759)</p>
        <p style="color: #ff3b30;">Red text (#ff3b30)</p>
    </div>
</body>
</html>
