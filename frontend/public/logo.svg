  <!-- Hammer Head -->
  <rect x="35" y="25" width="25" height="12" rx="2" fill="#C0C0C0" transform="rotate(15 60 60)"/>
  
  <!-- Screwdriver -->
  <rect x="65" y="35" width="6" height="40" rx="3" fill="#FFD700" transform="rotate(-10 60 60)"/>
  <rect x="63" y="32" width="10" height="8" rx="1" fill="#FF6B35" transform="rotate(-10 60 60)"/>
  
  <!-- Wrench -->
  <path d="M75 45 L85 55 L82 58 L72 48 Z" fill="#C0C0C0" transform="rotate(25 60 60)"/>
  <circle cx="77" cy="47" r="3" fill="none" stroke="#C0C0C0" stroke-width="2" transform="rotate(25 60 60)"/>
  
